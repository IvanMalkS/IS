name: Tests

on:
  pull_request:
    branches:
      - master
  push:
    branches:
      - master

jobs:
  run-tests:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          version: "latest"
          enable-cache: true

      - name: Set up Python
        run: uv python install 3.12

      - name: Install dependencies
        run: uv sync

      - name: Train model (prepare artifacts)
        run: |
          mkdir -p models
          uv run python src/train.py
        env:
          FORCE_TRAIN: "true"

      - name: Run tests
        run: |
          export PYTHONPATH=$PYTHONPATH:.
          uv run pytest
